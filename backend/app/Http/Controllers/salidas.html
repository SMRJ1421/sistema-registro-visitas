<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salidas - Sistema de Registro de Visitas</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tus estilos personalizados -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <!-- Barra de Navegación Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fas fa-id-card-alt me-2"></i>
                <h1>SISTEMA DE REGISTRO DE VISITAS</h1>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-user-plus me-1"></i> Registro
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="salidas.html">
                            <i class="fas fa-sign-out-alt me-1"></i> Salidas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="reportes.html">
                            <i class="fas fa-file-alt me-1"></i> Reportes
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button class="btn btn-outline-light voice-toggle-btn" id="btnVoiceControl">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-walking me-2"></i> VISITAS ACTUALMENTE EN LA INSTITUCIÓN</span>
                        <button class="btn btn-sm btn-light" onclick="cargarVisitasActivas()">
                            <i class="fas fa-sync-alt"></i> Actualizar
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>DNI</th>
                                        <th>Visitante</th>
                                        <th>Motivo</th>
                                        <th>Ingreso</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaSalidas">
                                    <!-- Se cargará mediante JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Aquí iría tu lógica de JS para manejar las salidas -->
</body>
</html>
