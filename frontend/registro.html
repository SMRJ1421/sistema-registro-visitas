<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Visitas - Inicio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>

    <div id="container"></div>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top animate__animated animate__fadeInDown">
        <div class="container-fluid ps-0 pe-4">
            <div class="header-brand-container d-flex align-items-center">
                <img src="img/gob_pe_logo.png" alt="Logo gob.pe" class="brand-logo-static">
                <div class="brand-divider"></div>
                <span class="brand-text-pcm">
                    Sistema de Registro de Visitas<br>
                    <span class="brand-subtext-pcm">(Normativa PCM)</span>
                </span>
            </div>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-center">
                    <li class="nav-item">
                        <a class="btn-admin-panel px-3 d-flex align-items-center justify-content-center" href="admin.html" id="btnAdminPanel">
                            <i class="fa-solid fa-lock mb-1"></i> Panel<br>Administrador
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="registro.html"><i class="fa-solid fa-user-plus mb-1"></i> Registro</a></li>
                    <li class="nav-item"><a class="nav-link" href="salidas.html"><i class="fa-solid fa-door-open mb-1"></i> Salidas</a></li>
                    <li class="nav-item"><a class="nav-link" href="auditoria.html"><i class="fa-solid fa-clipboard-check mb-1"></i> Auditoría</a></li>
                    <li class="nav-item"><a class="nav-link" href="reportes.html"><i class="fa-solid fa-magnifying-glass mb-1"></i> Consulta</a></li>
                    <li class="nav-item"><a class="nav-link" href="graficos.html"><i class="fa-solid fa-chart-pie mb-1"></i> Gráficos</a></li>
                    
                    <li class="nav-item">
                        <button id="btnVoiceToggle" class="btn-admin-panel d-flex align-items-center justify-content-center" type="button">
                            <i class="fa-solid fa-headphones-simple mb-1"></i> Activar<br>voz
                        </button>
                    </li>
                    
                    <li class="nav-item">
                        <div class="user-profile-container">
                            <button class="user-profile-btn" id="userBtn" onclick="toggleDropdown()" type="button">
                                <i class="fa-solid fa-user-circle" style="margin-right: 8px;"></i>
                                <span id="navUsuarioNombre">Cargando...</span>
                                <i class="fa-solid fa-caret-down" style="margin-left: 8px;"></i>
                            </button>
                            
                            <div class="user-dropdown-menu" id="userDropdown">
                                <a href="admin.html"><i class="fa-solid fa-tachometer-alt" style="margin-right: 8px;"></i> Panel Administrador</a>
                                <a href="perfil.html"><i class="fa-solid fa-user-gear" style="margin-right: 8px;"></i> Ver Perfil</a>
                                <hr class="dropdown-divider">
                                <a href="#" onclick="cerrarSesionDelSistema(event)" class="text-danger">
                                    <i class="fa-solid fa-right-from-bracket" style="margin-right: 8px;"></i> Cerrar Sesión
                                </a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container animate__animated animate__fadeIn" style="margin-top: 105px; position: relative; z-index: 2;">
        <div class="row">
            <div class="col-md-5">
                <div class="card mb-4 border-0 shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold py-3 text-uppercase" style="letter-spacing: 0.5px; font-size: 0.85rem;">
                        <i class="fa-solid fa-user-plus me-2 text-danger"></i> Registrar Visita
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form id="formAsistencia">
                            <div class="mb-3">
                                <div class="form-check form-switch float-end d-flex align-items-center gap-2">
                                <input class="form-check-input" type="checkbox" id="modoAutomatico" style="cursor: pointer;">
                                <label class="form-check-label small text-muted m-0" for="modoAutomatico" style="cursor: pointer;">
                                Búsqueda Automática Reniec: <span id="estadoApi" class="fw-medium text-muted">Desactivado</span>
                                </label>
                                </div>
                                <label for="Dni" class="form-label fw-bold text-secondary small">DNI</label>
                                <input type="text" class="form-control rounded-1" id="Dni" maxlength="8" required placeholder="Ingrese 8 dígitos">
                            </div>
                            <div class="mb-3">
                                <label for="Nombres" class="form-label fw-bold text-secondary small">Nombres</label>
                                <input type="text" class="form-control rounded-1" id="Nombres" required placeholder="Nombres del visitante">
                            </div>
                            <div class="mb-3">
                                <label for="Apellidos" class="form-label fw-bold text-secondary small">Apellidos</label>
                                <input type="text" class="form-control rounded-1" id="Apellidos" required placeholder="Apellidos del visitante">
                            </div>
                            <div class="mb-3">
    <label for="MotivoSelect" class="form-label fw-bold text-secondary small">Motivo de la Visita</label>
    
    <select class="form-select rounded-1 mb-2" id="MotivoSelect" required>
        <option value="" disabled selected>Seleccione un motivo...</option>
        <option value="Gestión Documentaria">Gestión Documentaria</option>
        <option value="Trámite Administrativo">Trámite Administrativo</option>
        <option value="Reunión de Trabajo">Reunión de Trabajo</option>
        <option value="Atención al Ciudadano">Atención al Ciudadano</option>
        <option value="Mantenimiento / Proveedores">Mantenimiento / Proveedores</option>
        <option value="Otro">Otro (Especificar)</option>
    </select>

    <div id="contenedorMotivoOtro" style="display: none;" class="animate__animated animate__fadeIn">
        <div class="input-group">
            <input type="text" class="form-control rounded-0" id="MotivoVisita" placeholder="Escriba o use el micrófono">
            <button class="btn btn-outline-secondary rounded-0" type="button" id="btnMicMotivo">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>
</div>
                            <button type="submit" class="btn btn-reniec w-100 fw-bold py-2 shadow-sm border-0 text-uppercase" style="letter-spacing: 0.5px;">
                                <i class="fa-solid fa-floppy-disk me-2"></i> Guardar Ingreso
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold py-3 text-uppercase" style="letter-spacing: 0.5px; font-size: 0.85rem;">
                        <i class="fa-solid fa-list-clock me-2 text-danger"></i> Visitas Registradas Hoy
                    </div>
                    <div class="card-body p-0 bg-white">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3" style="width: 12%;">ID</th>
                                        <th style="width: 20%;">DNI</th>
                                        <th style="width: 33%;">Visitante</th>
                                        <th style="width: 15%;">Ingreso</th>
                                        <th class="pe-3" style="width: 20%;">Motivo</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaVisitas">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/registro.js"></script>
    <script src="js/estilos.js"></script>
</body>
</html>
