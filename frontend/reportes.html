<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENIEC - Consulta de Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/reportes.css">
</head>
<body>
    <div id="container"></div>
    
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top animate__animated animate__fadeInDown">
        <div class="container-fluid ps-0 pe-4">
            <div class="header-brand-container d-flex align-items-center">
                <img src="img/gob_pe_logo.png" alt="Logo gob.pe" class="brand-logo-static">
                <div class="brand-divider"></div>
                <span class="brand-text-pcm">
                    Sistema de Registro de Visitas<br>
                    <span class="brand-subtext-pcm">(Normativa PCM)</span>
                </span>
            </div>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2 align-items-center">
                    
                    <li class="nav-item solo-admin d-none">
                        <a class="btn-admin-panel px-3 d-flex align-items-center justify-content-center" href="admin.html" id="btnAdminPanel">
                            <i class="fa-solid fa-lock mb-1"></i> Panel<br>Administrador
                        </a>
                    </li>
                    <li class="nav-item solo-admin d-none"><a class="nav-link" href="registro.html"><i class="fa-solid fa-user-plus mb-1"></i> Registro</a></li>
                    <li class="nav-item solo-admin d-none"><a class="nav-link" href="salidas.html"><i class="fa-solid fa-door-open mb-1"></i> Salidas</a></li>
                    <li class="nav-item solo-admin d-none"><a class="nav-link" href="auditoria.html"><i class="fa-solid fa-clipboard-check mb-1"></i> Auditoría</a></li>
                    
                    <li class="nav-item"><a class="nav-link active fw-bold" href="reportes.html"><i class="fa-solid fa-magnifying-glass mb-1"></i> Consulta</a></li>
                    <li class="nav-item"><a class="nav-link" href="graficos.html"><i class="fa-solid fa-chart-pie mb-1"></i> Gráficos</a></li>
                    
                    <li class="nav-item">
                        <button id="btnVoiceToggle" class="btn-admin-panel d-flex align-items-center justify-content-center" type="button">
                            <i class="fa-solid fa-headphones-simple mb-1"></i> Activar<br>voz
                        </button>
                    </li>
                    
                    <li class="nav-item" id="itemAutenticacionDinamica">
                        <div class="user-profile-container" id="contenedorPerfilAdmin">
                            <button class="user-profile-btn" id="userBtn" onclick="toggleDropdown()" type="button">
                                <i class="fa-solid fa-user-circle" style="margin-right: 8px;"></i>
                                <span id="navUsuarioNombre">Cargando...</span>
                                <i class="fa-solid fa-caret-down" style="margin-left: 8px;"></i>
                            </button>
                            
                            <div class="user-dropdown-menu" id="userDropdown">
                                <a href="admin.html"><i class="fa-solid fa-tachometer-alt" style="margin-right: 8px;"></i> Panel Administrador</a>
                                <a href="perfil.html"><i class="fa-solid fa-user-gear" style="margin-right: 8px;"></i> Ver Perfil</a>
                                <hr class="dropdown-divider">
                                <a href="#" onclick="cerrarSesionDelSistema(event)" class="text-danger">
                                    <i class="fa-solid fa-right-from-bracket" style="margin-right: 8px;"></i> Cerrar Sesión
                                </a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="margin-top: 100px !important;">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-4"><i class="fa-solid fa-filter me-2 text-danger"></i>Filtros de Búsqueda</h5>
                <form id="formFiltros" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">DNI Visitante</label>
                        <input type="text" class="form-control" id="filtroDni" maxlength="8">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Desde</label>
                        <input type="date" class="form-control" id="filtroDesde">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Hasta</label>
                        <input type="date" class="form-control" id="filtroHasta">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-danger w-100">
                            <i class="fa-solid fa-magnifying-glass me-2"></i>Buscar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span><i class="fa-solid fa-list-check me-2 text-info"></i>Historial de Visitas</span>
                <div class="btn-group gap-3">
                    <button class="btn btn-sm btn-neon-excel" id="btnExportarExcel">
                        <i class="fa-solid fa-file-excel me-1"></i> Excel
                    </button>
                    <button class="btn btn-sm btn-neon-pdf" id="btnExportarPDF">
                        <i class="fa-solid fa-file-pdf me-1"></i> PDF
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50px;" class="text-center">#</th> 
                                <th>Fecha</th>
                                <th>DNI</th>
                                <th>Visitante</th>
                                <th>Ingreso</th>
                                <th>Salida</th>
                                <th>Motivo</th>
                            </tr>
                        </thead>
                        <tbody id="tablaReportes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script src="js/estilos.js"></script> 
    <script src="js/reportes.js"></script>
</body>
</html>
